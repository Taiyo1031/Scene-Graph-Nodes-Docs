name: Test documentation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: npm install
      - name: Check docs coverage
        run: npm run check-docs
      - name: Build English site
        run: |
          npm run build:en || {
            find . -path '*server.bundle.js' -print
            find . -path '*server.bundle.js' -exec grep -n -o '.\{0,160\}resolveWeak.\{0,220\}' {} \;
            exit 1
          }
      - name: Build Japanese site
        run: npm run build:ja
